<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>Starpath Academy - Loading</title>
        <link rel="icon" type="image/png" href="assets/img/all-img/favicon.png">

        <style>
            /* ── Reset & Full Page ── */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Poppins', sans-serif;
                background: #ffffff;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            /* ── Loader Container ── */
            .loader-page {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #ffffff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 999999;
                transition: opacity 0.6s ease, visibility 0.6s ease;
            }

            .loader-page.hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            /* ── Preloader Dots ── */
            .preloader-container {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                height: 80px;
                width: 80px;
                flex-wrap: wrap;
            }

            .preloader-dot {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                background: #28a745;
                animation: preloader-dot-anim 1.2s ease-in-out infinite;
            }

            .preloader-dot:nth-child(1) { animation-delay: 0.0s; }
            .preloader-dot:nth-child(2) { animation-delay: 0.1s; }
            .preloader-dot:nth-child(3) { animation-delay: 0.2s; }
            .preloader-dot:nth-child(4) { animation-delay: 0.3s; }
            .preloader-dot:nth-child(5) { animation-delay: 0.4s; }

            @keyframes preloader-dot-anim {
                0%, 100% {
                    transform: scale(0.5);
                    opacity: 0.3;
                }
                50% {
                    transform: scale(1.2);
                    opacity: 1;
                }
            }

            /* ── Branding ── */
            .loader-brand {
                margin-top: 40px;
                text-align: center;
            }

            .loader-brand h4 {
                color: #28a745;
                font-weight: 700;
                font-size: 20px;
                letter-spacing: 3px;
                margin: 0;
            }

            .loader-brand p {
                color: #888;
                font-size: 13px;
                margin: 5px 0 0;
                letter-spacing: 2px;
            }

            .loader-brand .loader-logo {
                max-width: 140px;
                margin-bottom: 12px;
                display: block;
                margin-left: auto;
                margin-right: auto;
            }
        </style>
    </head>
    <body>

        <!-- ═══ LOADER PAGE ═══ -->
        <div class="loader-page" id="loaderPage">
            <!-- Preloader Dots -->
            <div class="preloader-container" id="preloader">
                <div class="preloader-dot"></div>
                <div class="preloader-dot"></div>
                <div class="preloader-dot"></div>
                <div class="preloader-dot"></div>
                <div class="preloader-dot"></div>
            </div>

            <!-- Branding -->
            <div class="loader-brand">
                <img class="loader-logo" src="assets/img/starassets/startransparentlogo.png" alt="Starpath Academy">
                <h4>STARPATH ACADEMY</h4>
                <p>Where Stars Are Made</p>
            </div>
        </div>

        <!-- ═══ REDIRECT SCRIPT ═══ -->
        <script>
            // ── Wait 3 seconds, fade out, then redirect ──
            setTimeout(function() {
                const loader = document.getElementById('loaderPage');
                loader.classList.add('hidden');

                // Redirect after fade completes (600ms)
                setTimeout(function() {
                    window.location.href = '/canyon/index.html';
                }, 600);
            }, 3000);

            // ── Fallback: 8 seconds max wait ──
            setTimeout(function() {
                const loader = document.getElementById('loaderPage');
                if (!loader.classList.contains('hidden')) {
                    loader.classList.add('hidden');
                    setTimeout(function() {
                        window.location.href = '/canyon/index.html';
                    }, 600);
                }
            }, 8000);
        </script>

    </body>
</html>
